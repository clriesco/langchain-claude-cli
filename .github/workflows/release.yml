name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) — no token stored anywhere.
# Trigger: push a tag like v0.2.0 (after bumping version in pyproject.toml).

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist and wheel
        run: uv build
      - name: Check tag matches package version
        run: |
          PKG_VERSION=$(uvx --from toml-cli toml get --toml-path pyproject.toml project.version)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match pyproject version $PKG_VERSION" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
